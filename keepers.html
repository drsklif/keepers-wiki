    var _getRequestParameters = function () {
        const r = {};
        const search = location.search;
        if (search.length > 0) {
            const s1 = search.substring(1, search.length).split('&');
            for (let i = 0; i < s1.length; i++) {
                const param = s1[i];
                const eqIdx = param.indexOf('=');
                const key = param.substring(0, eqIdx);
                const value = param.substring(eqIdx + 1);
                r[decodeURIComponent(key)] = decodeURIComponent(value);
            }
        }
        return r;
    };

<script type="text/javascript">
    var Progress = function (spinner, progress, advice) {
        this.deg = 0;
        this.progress = 0;
        this.total = 0;
        this.el = {};
        this.el.spinner = spinner;
        this.el.progress = progress;
        this.el.advice = advice;
        this.done = 0;
    };
    Progress.prototype.set = function (progress, total, text) {
        this.progress = progress;
        this.total = total;
        if (text) this.setText(text);
    };
    Progress.prototype.inc = function (value) {
        this.progress += value ? value : 1;
    };
    Progress.prototype.setText = function (text) {
        this.el.advice.innerText = text;
    };
    Progress.prototype.isComplete = function () {
        return this.progress >= this.total;
    };
    Progress.prototype.update = function () {
        if (this.deg > 300 && this.deg < 370) {
            this.deg += 3;
        } else if (this.deg > 370) {
            this.deg = this.deg - 370;
        } else {
            this.deg += 7;
        }
    };
    Progress.prototype.render = function () {
        this.el.spinner.style.transform = 'rotate(' + this.deg + 'deg)';

        var p = this.progress / this.total * 100;
        p = Math.min(p, 100);
        this.el.progress.style.width = p + '%';
    };

    var progress = new Progress(document.getElementById('loading_spinner'), document.getElementById('loading_prg'), document.getElementById('loading_advice'));

    function update() {
        progress.update();
        progress.render();
        if (!progress.done) {
            requestAnimationFrame(update);
        }
    }

    progress.setText('Загрузка ресурсов');
    update();
</script>

<script>
    function prepareAuthCommand() {
        let cmd = {};

        let params = _getRequestParameters();
        let partner;

        if (VK_ODR || (params.partner === 'vk' || location.hostname === 'vk.keepers.mobi' /*|| location.hostname === 'test.vk.keepers.mobi'*/)) {
            partner = {};
            partner.t = 'VK';
            partner.uID = params.viewer_id;
            partner.access_token = params.access_token;
            partner.auth_key = params.auth_key;
            partner.referrer = params.referrer;
            if (params.hash) {
                partner.hash = params.hash;
            }
            if (params.partner === 'vk') {
                partner.iframe = 1;
            } else {
                partner.mobile = 1;
            }
            cmd.partner = partner;

        } else if (params.partner === 'ok' || location.hostname === 'od.keepers.mobi') {
            partner = {};
            partner.t = 'OK';
            partner.uID = params.logged_user_id;
            partner.sig = params.sig;
            partner.api_server = params.api_server;
            partner.auth_sig = params.auth_sig;
            partner.session_key = params.session_key;
            partner.session_secret_key = params.session_secret_key;
            partner.custom_args = params.custom_args;
            cmd.partner = partner;

        } else if (params.partner === 'spaces' || location.hostname === 'spaces.keepers.mobi') {
            partner = {};
            partner.t = 'SPACES';
            partner.uID = params.login;
            partner.app_sid = params.app_sid;
            cmd.partner = partner;

        } else if (location.hostname === 'mailru.keepers.mobi') {
            partner = {};
            partner.t = 'MAILRU';
            partner.uID = app.Mailru.user.uid;
            cmd.partner = partner;

        } else if (location.hostname === 'mmr.keepers.mobi') {
            partner = {};
            partner.t = 'MMR';
            partner.uID = params.vid;
            partner.params = params;
            cmd.partner = partner;

        } else if (location.hostname === 'exe.keepers.mobi') {
            partner = {};
            partner.t = 'EXERU';
            partner.uID = params.exe_user;
            partner.auth_key = params.auth_key;
            if (params.request_key) partner.request_key = params.request_key;
            cmd.partner = partner;

        } else if (location.hostname === 'fs.keepers.mobi') {
            partner = {};
            partner.t = 'FS';
            partner.uID = params.viewerId;
            partner.auth_key = params.authKey;
            if (params.optParams) {
                partner.custom_args = params.optParams;
            }
            cmd.partner = partner;

        } else if (location.hostname === 'gamepad.keepers.mobi') {
            partner = {};
            partner.t = 'GAME_PAD';
            partner.uID = params.user_id;
            partner.user_key = params.user_key;
            partner.api_url = params.api_url;
            partner.auth_token = params.auth_token;
            cmd.partner = partner;

        } else if (location.hostname === 'anwap.keepers.mobi') {
            cmd.channel = 39726;

        } else if (params.partner === 'rbk') {
            partner = {};
            partner.t = 'RBK';
            partner.uID = partner.logged_user_id = params.logged_user_id;
            partner.api_server = params.api_server;
            partner.session_key = params.session_key;
            partner.auth_sig = params.auth_sig;
            partner.sig = params.sig;
            partner.application_id = params.application_id;
            partner.lang = params.lang;
            partner.partner = params.partner;
            if (params.promo) {
                partner.promo = params.promo;
            }
            cmd.partner = partner;

        } else if (params.partner === 'ag' || location.hostname === 'ag.keepers.mobi') {
            const guest = params.guest === 'true'
                ? true
                : params.guest === 'false'
                    ? false
                    : !!params.guest;
            console.log('guest', guest);

            cmd.partner = {
                t: 'AG',
                uID: params.player_id,
                game_sid: params.game_sid,
                app_id: params.app_id,
                auth_key: params.auth_key,
                guest: guest
            };

        } else if (location.hostname === 'test.beeline.keepers.mobi' || location.hostname === 'beeline.keepers.mobi') {
            partner = {
                t: 'BEELINE',
                auth_token: params.auth
            };
            cmd.partner = partner;

        } else if (location.hostname === 'playdeck.keepers.mobi') {
            partner = {
                t: 'PLAYDECK',
                token: window.playdeckUser.token
            };
            cmd.partner = partner;

        } else if (params.channelId) {
            if (params.channelId === 'mdragons') {
                cmd.channel = {
                    id: params.channelId,
                    u: Number(params.u),
                    l: Number(params.l),
                    sig: params.sig
                };
            } else {
                cmd.channel = Number(params.channelId.trim());
            }

        } else if (params.r) {
            cmd.referrer = Number(params.r.trim());
        }

        if (params.google) {
            cmd.google = 1;
            if (typeof google !== 'undefined' && google.getDeviceID) {
                cmd.deviceID = google.getDeviceID();
            }
        }

        return cmd;
    }

    function handleErrors() {
        window.onerror = function (msg, url, line, col, error) {
            if (typeof app !== 'undefined') {
                if (app && app.Utils) {
                    let show = true;
                    if (app.Model && window._isMeVK) {
                    } else {
                        if (location.hostname === 'od.keepers.mobi' || location.hostname === 'vk.keepers.mobi') {
                            show = false;
                        }
                    }
                    if (show) {
                        app.Utils.showInfo('Произошла ошибка! Попробуйте сбросить кеш, и обновить игру!', {
                            top: 200,
                            animation: 0,
                            duration: 5
                        });
                    }
                }
            }

            let info;
            if (error && error.stack) {
                info = error.stack;
            } else {
                info = msg + ' Script: ' + url + ' Line: ' + line + ' Column: ' + col + ' StackTrace: ' + error;
            }

            info += ' ' + navigator.userAgent;

            if (typeof app !== 'undefined') {
                if (app && app.Network && app.Network.isConnected()) {
                    app.Network.command({
                        cmd: 'Error',
                        error: info
                    });
                }
            }

            return false;
        };
        window.onunhandledrejection = function (event) {
            console.log('onunhandledrejection');
            if (event
                && event.detail
                && event.detail.reason
                && event.detail.reason.stack) {

                let info = event.detail.reason.stack;

                console.log(info);

                if (typeof app !== 'undefined') {
                    if (app && app.Network) {
                        app.Network.command({
                            cmd: 'Error',
                            error: info
                        });
                    }
                }
            }
        };
    }

    function loadJS0(path, onLoad) {
        let el = document.createElement('script');
        el.type = 'text/javascript';
        el.onload = function () {
            if (onLoad) onLoad();
        };
        el.async = true;
        el.src = path;
        document.getElementsByTagName('head')[0].appendChild(el);
    }

    handleErrors();

</script>

<script type="text/javascript">
    var HELPER = {
        isTouchAvailable: function () {
            if (('ontouchstart' in window) || window.DocumentTouch && document instanceof DocumentTouch) return true;
            if (navigator.MaxTouchPoints > 0 || navigator.msMaxTouchPoints > 0) return true;

            // include the 'heartz' as a way to have a non matching MQ to help terminate the join
            // https://git.io/vznFH
            let mq = function (query) {
                return window.matchMedia(query).matches;
            };
            let prefixes = ' -webkit- -moz- -o- -ms- '.split(' ');
            let query = ['(', prefixes.join('touch-enabled),('), 'heartz', ')'].join('');
            return mq(query);
        }
    };

    if (HELPER.isTouchAvailable()) {
        HELPER.tmp = {};
        HELPER.clear = function () {
            document.removeEventListener('touchmove', HELPER.tmp.touchmove);
            delete HELPER.touchmove;
        };
        document.addEventListener('touchmove', HELPER.tmp.touchmove = function (event) {
            event.preventDefault();
            event.stopPropagation();
        }, {passive: false});
    }
</script>

                                                                app.loadJS1('Agreement', function () {
                                                                    app.Agreement.create4();
                                                                });
                                                            }
                                                            if (location.hash && location.hash === '#privacy') {
                                                                app.loadJS1('Agreement', function () {
                                                                    app.Agreement.create3();
                                                                });
                                                            }

                                                            window.onhashchange = function (event) {
                                                                if (location.hash && location.hash === '#bank/sms/ua') {
                                                                    if (app.Model) {
                                                                        app.Model.user.sms_country = 'ua';
                                                                        app.MainPage.showSMSCountry();
                                                                    }
                                                                }
                                                                if (location.hash && location.hash === '#agreement') {
                                                                    app.loadJS1('Agreement', function () {
                                                                        app.Agreement.create1();
                                                                    });
                                                                }
                                                                if (location.hash && location.hash === '#rules') {
                                                                    app.loadJS1('Agreement', function (page) {
                                                                        app.Agreement.create2();
                                                                    });
                                                                }
                                                                if (location.hash && location.hash === '#privacy') {
                                                                    app.loadJS1('Agreement', function () {
                                                                        app.Agreement.create3();
                                                                    });
                                                                }
                                                            };

                                                            TweenMax.delayedCall(0.1, function () {
                                                                app.Network.command({cmd: 'WorldInfo'}, function (data) {
                                                                    if (data.error) {
                                                                    } else {
                                                                        let battle = data.battle;
                                                                        if (battle) {
                                                                            if (battle.state === 'END') {
                                                                                if ((battle.t === 2 || battle.t === 3 || battle.t === 4 || battle.t === 8)
                                                                                    && (battle.data === undefined || battle.data.completeProcessed !== 0)) {
                                                                                    app.BattlePage.showContinue(data.battle);
                                                                                }
                                                                            } else {
                                                                                app.BattlePage.showContinue(data.battle);
                                                                            }
                                                                        }
                                                                        if (data.restart) {
                                                                            app.MainPage.showRestart(data.restart);
                                                                        }

                                                            });

                                                                });
                                                            }

                                                                app.Playdeck.setLoadingProgress(100);
                                                            }
                                                        });
                                                });
                                        });
                                    });

                                    app.Network.command(cmd, function (data) {
                                        if (data.error) {
                                            app.Utils.processErrors(data.error);
                                        } else {
                                            app.TimeUtil.init(data.cfg.server);
                                            app.Model.cfg = data.cfg;
                                            app.Model.cfg.dice = {
                                                type: {
                                                    F: 'F',
                                                    N: 'N',
                                                    W: 'W',
                                                    HIT: 'HIT'
                                                }
                                            };
                                            app.Model.user = data.user;
                                            if (cmd.partner) {
                                                if (cmd.partner.t === 'VK') {
                                                    app.Model.user.partner.access_token = cmd.partner.access_token;
                                                    app.Model.user.partner.uID = cmd.partner.uID;
                                                    if (cmd.partner.iframe) app.Model.user.partner.iframe = 1;
                                                    if (cmd.partner.mobile) app.Model.user.partner.mobile = 1;
                                                }
                                            }

                                            app.onResize();

                                            if (data.battle && data.battle.state !== 'END') {
                                                app.BattlePage.showContinue(data.battle);
                                            }
                                            if (data.restart) {
                                                app.MainPage.showRestart(data.restart);
                                            }

                                        }
                                    });

                                    app.World.showConnectionLost(data);
                                }
                                if (app.Utils.el('loading0')) {
                                    let loading0 = app.Utils.el('loading0');
                                    loading0.parentNode.removeChild(loading0);
                                    progress.done = 1;
                                }
                                if (window.TweenMax) TweenMax.killAll(true, true, true, true);
                            });

                            if (app.LAYOUT.MAILRU) {
                                app.loadJS('Mailru', function () {
                                    app.Mailru.init();

                                    let idx = app.EventDispatcher.addEventListener('MAILRU onLogin', function (data) {
                                        app.EventDispatcher.removeEventListener('MAILRU onLogin', idx);
                                        document.body.className = '';
                                        document.body.style = 'background: #000; margin: 0 auto; font-size: 14px; color: #fff; font-family: Arial,sans-serif; max-width: 480px; -moz-user-select: none; -webkit-user-select: none; user-select: none; overflow-y: hidden';
                                        app.Utils.el('loading0').style.display = '';
                                        app.Mailru.removeLanding();
                                        app.Mailru.user = data.user;
                                        app.Network.init();
                                    });

                                    let start = Date.now();
                                    let timer = setInterval(function () {
                                        if (app.Mailru.api()) {
                                            let params = app.Utils.getRequestParameters();
                                            if (params.status && (params.status === 0 || params.status === '0')) {
                                                app.Utils.el('loading0').style.display = 'none';
                                                app.World.createMain();
                                                app.Mailru.createLanding();
                                            } else if (params.status && (params.status === 1 || params.status === '1')) {
                                                app.World.createMain();
                                                app.Mailru.createLanding();
                                            } else {
                                                app.Mailru.api().getLoginStatus();
                                            }
                                            clearInterval(timer);
                                        } else {
                                            if (Date.now() - start > 10000) {
                                                clearInterval(timer);
                                                location.reload(false);
                                            }
                                        }
                                    }, 100);
                                });
                            } else {
                                app.Network.init();
                            }
                        };

                        if (window.playdeck) {
                            const wait = () => {
                                console.log('window.playdeckUser', window.playdeckUser);
                                if (window.playdeckUser === undefined) {
                                    setTimeout(wait, 100);
                                } else {
                                    internalLoad();
                                }
                            };
                            wait();
                        } else {
                            internalLoad();
                        }
                    }
                };
                app.loadCSS('style', onLoad);
                app.loadCSS('common', onLoad);
                if (app.LAYOUT.VK || app.LAYOUT.OK_750 || app.LAYOUT.EXERU || app.LAYOUT.FS || app.LAYOUT.MMR) {
                    app.loadCSS('vk_750', onLoad);
                }
            }
        };
        app.loadGSAP(onLoad);
        app.loadJS('EventDispatcher', onLoad);
        app.loadJS('Network', onLoad);
        app.loadJS('Utils', onLoad);
        app.loadJS('Model', onLoad);
        app.loadJS('World', onLoad);

        if (location.hostname === 'ag.keepers.mobi') {
            app.loadJS1('AGUtil', () => {
                app.AGUtil.init();
            });
        }

        if (location.hostname === 'playdeck.keepers.mobi') {
            window.playdeck = 1;
            app.loadJS1('Playdeck', () => {
                console.log('Playdeck::loaded');
                app.Playdeck.init();
                app.Playdeck.setLoadingProgress(1);
                app.loadEruda();
            });
        }

        window.addEventListener('resize', app.onResize);
    });
</script>
